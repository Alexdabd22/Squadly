# ═══════════════════════════════════════════════════════════════════════════
# .gitlab-ci.yml — CI/CD Pipeline для Squadly
# Проект: ASP.NET Core 8 Web API (backend) + React 19 + Vite (frontend)
# Executor: shell (Windows, PowerShell) 
# Автор: Пастухов Олександр Костянтинович, ІПЗ-22-4
# ═══════════════════════════════════════════════════════════════════════════


# Кожен наступний stage стартує тільки після успішного завершення попереднього.
stages:
  - build     # Компіляція backend + збірка frontend
  - test      # Юніт-тести + лінтинг
  - docker    # Збірка Docker images
  - deploy    # Імітація розгортання (тільки для main)

variables:
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  IMAGE_BACKEND: "squadly-backend"
  IMAGE_FRONTEND: "squadly-frontend"


cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget/packages/
    - frontend/node_modules/


backend_build:
  stage: build
  tags: [student]
  script:
    - 'echo "=== Backend build stage ==="'
    - cd backend
    - dotnet restore Squadly.sln --packages "$env:NUGET_PACKAGES"
    - dotnet build Squadly.sln --configuration Release --no-restore
    - cd ..
    - 'if (-not (Test-Path build-report)) { New-Item -ItemType Directory build-report }'
    - '"Build date: $(Get-Date)" | Out-File -Encoding utf8 build-report/info.txt'
    - '"Branch: $env:CI_COMMIT_REF_NAME" | Out-File -Encoding utf8 -Append build-report/info.txt'
    - '"Commit: $env:CI_COMMIT_SHORT_SHA" | Out-File -Encoding utf8 -Append build-report/info.txt'
    - '"Pipeline: $env:CI_PIPELINE_ID" | Out-File -Encoding utf8 -Append build-report/info.txt'
    - Get-Content build-report/info.txt
  artifacts:
    paths:
      - backend/Squadly.API/bin/
      - backend/Squadly.API/obj/
      - backend/Squadly.Application/bin/
      - backend/Squadly.Infrastructure/bin/
      - backend/Squadly.Domain/bin/
      - backend/Squadly.Tests/bin/
      - backend/Squadly.Tests/obj/
      - build-report/
    expire_in: 1 hour


frontend_build:
  stage: build
  tags: [student]
  script:
    - 'echo "=== Frontend build stage ==="'
    - cd frontend
    - npm ci --no-audit --no-fund
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
      - frontend/node_modules/
    expire_in: 1 hour



# backend_test 
backend_test:
  stage: test
  tags: [student]
  dependencies:
    - backend_build
  script:
    - 'echo "=== Backend test stage ==="'
    - Get-Content build-report/info.txt
    - cd backend
    - dotnet test Squadly.sln --configuration Release --no-build --verbosity normal

# frontend_lint 
frontend_lint:
  stage: test
  tags: [student]
  dependencies:
    - frontend_build
  script:
    - 'echo "=== Frontend lint stage ==="'
    - cd frontend
    - npm run lint
  allow_failure: true


# docker_build_backend ─
docker_build_backend:
  stage: docker
  tags: [student]
  script:
    - 'echo "=== Docker build backend ==="'
    - 'docker build -t "$env:IMAGE_BACKEND`:$env:CI_COMMIT_SHORT_SHA" -t "$env:IMAGE_BACKEND`:latest" -f backend/Squadly.API/Dockerfile backend/'
    - 'docker images | Select-String "$env:IMAGE_BACKEND"'

# docker_build_frontend 
docker_build_frontend:
  stage: docker
  tags: [student]
  script:
    - 'echo "=== Docker build frontend ==="'
    - 'docker build -t "$env:IMAGE_FRONTEND`:$env:CI_COMMIT_SHORT_SHA" -t "$env:IMAGE_FRONTEND`:latest" frontend/'
    - 'docker images | Select-String "$env:IMAGE_FRONTEND"'


deploy_staging:
  stage: deploy
  tags: [student]
  only:
    - main
  script:
    - 'echo "=== Deploy staging ==="'
    - 'if (-not (Test-Path deployment)) { New-Item -ItemType Directory deployment }'
    - '"=== SQUADLY DEPLOYMENT MANIFEST ===" | Out-File -Encoding utf8 deployment/manifest.txt'
    - '"Environment: staging" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Deploy date: $(Get-Date)" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Git branch: $env:CI_COMMIT_REF_NAME" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Git commit: $env:CI_COMMIT_SHA" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Pipeline ID: $env:CI_PIPELINE_ID" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Backend image: $env:IMAGE_BACKEND`:$env:CI_COMMIT_SHORT_SHA" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Frontend image: $env:IMAGE_FRONTEND`:$env:CI_COMMIT_SHORT_SHA" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - '"Deploy status: SIMULATED OK" | Out-File -Encoding utf8 -Append deployment/manifest.txt'
    - Get-Content deployment/manifest.txt
    - 'echo ">>> In production here would be: kubectl apply / docker-compose up / ssh deploy"'
  artifacts:
    paths:
      - deployment/
    expire_in: 7 days
  environment:
    name: staging